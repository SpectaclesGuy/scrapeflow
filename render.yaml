services:
  - type: web
    name: scrapeflow-context
    runtime: python
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_NAME
        value: ScrapeFlow Context Service
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
