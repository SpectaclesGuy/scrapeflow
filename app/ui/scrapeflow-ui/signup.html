<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Signup | ScrapeFlow</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="/ui/css/style.css"><link rel="stylesheet" href="/ui/css/forms.css"></head><body data-public="true"><div class="auth-shell"><div class="card auth-card"><p class="eyebrow">Create account</p><h1 style="margin:0 0 12px;font-size:34px">Build your extraction workspace</h1><p class="page-subtitle">Create an account to start projects, chat with the planner, and queue jobs.</p><form id="signupForm" class="section-grid" style="margin-top:24px"><div class="field"><label>Name</label><input type="text" name="name" placeholder="JOhn Doe" required></div><div class="field"><label>Email</label><input type="email" name="email" placeholder="name@company.com" required></div><div class="field"><label>Password</label><input type="password" name="password" placeholder="At least 8 characters" required></div><div class="field"><label>Confirm password</label><input type="password" name="confirmPassword" placeholder="Repeat password" required></div><div id="signupError" class="validation-error hidden"></div><div class="auth-actions"><button class="button" type="submit">Create Account</button><a class="button-secondary" href="/login.html">Back to login</a></div></form></div></div><script src="/ui/js/config.js"></script><script src="/ui/js/mock.js"></script><script src="/ui/js/api.js"></script><script src="/ui/js/utils.js"></script><script src="/ui/js/auth.js"></script><script>document.getElementById('signupForm').addEventListener('submit',async(event)=>{event.preventDefault();const error=document.getElementById('signupError');error.classList.add('hidden');try{await window.ScrapeFlowAuth.signup(new FormData(event.currentTarget));window.ScrapeFlowUI.toast('Account created. Redirecting...','success');setTimeout(()=>window.location.href='/dashboard.html',350);}catch(err){error.textContent=err.message;error.classList.remove('hidden');}});</script></body></html>
